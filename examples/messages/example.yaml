# yaml-language-server: $schema=../../schema/sofabuffers-schema-v1.json
#
# example.yaml - the SofaBuffers showcase definition.
#
# A single message, `myfirstmessage`, that exercises every field type and
# feature the generator supports, ordered from the simplest types to the most
# complex so it reads cleanly top to bottom:
#
#   unsigned ints -> signed ints -> floats -> boolean -> string/blob ->
#   enum -> bitfield -> arrays -> struct -> union
#
# Per-field attributes shown: id (the wire key, unique per scope), description,
# unit, default, deprecated, decimals (fp hint), maxlen (string/blob/elements).
# Field ids are the wire keys: stable, unique within their scope, and what a
# decoder uses to skip unknown fields for forward/backward compatibility.
version: 1

messages:
  myfirstmessage:
    summary: |
      A demonstration message that uses every supported field type and feature.
    payload:

      # --- Unsigned integers: u8, u16, u32, u64 --------------------------------
      someu8:
        id: 0
        type: u8
        description: "Unsigned 8-bit integer"
        default: 7
      someu16:
        id: 1
        type: u16
        description: "Unsigned 16-bit integer"
        default: 1000
      someu32:
        id: 2
        type: u32
        description: "Unsigned 32-bit integer"
        default: 100000
      someu64:
        id: 3
        type: u64
        description: "Unsigned 64-bit integer"
        default: "18446744073709551615"   # exact 64-bit value via string (avoids float rounding)

      # --- Signed integers: i8, i16, i32, i64 ----------------------------------
      somei8:
        id: 4
        type: i8
        description: "Signed 8-bit integer"
        unit: kg                           # unit: hint for tooling/docs
        default: 10
        deprecated: true                   # readers may skip a deprecated field
      somei16:
        id: 5
        type: i16
        description: "Signed 16-bit integer"
        default: -12345
      somei32:
        id: 6
        type: i32
        description: "Signed 32-bit integer"
        default: -2000000
      somei64:
        id: 7
        type: i64
        description: "Signed 64-bit integer"
        default: "-9223372036854775808"   # exact 64-bit value via string (avoids float rounding)

      # --- Floating point: fp32, fp64 ------------------------------------------
      somefp32:
        id: 8
        type: fp32
        description: "32-bit IEEE-754 float"
        default: 0
        decimals: 2                        # precision hint for tooling (not on the wire)
      somefp64:
        id: 9
        type: fp64
        description: "64-bit IEEE-754 float"
        default: 3.141592653589793
        decimals: 6                        # precision hint for tooling (not on the wire)

      # --- Boolean -------------------------------------------------------------
      somebool:
        id: 10
        type: boolean
        description: "A boolean flag"
        default: true

      # --- Variable-length: string, blob ---------------------------------------
      somestring:
        id: 11
        type: string
        description: "A UTF-8 string"
        maxlen: 50                         # caps the encoded byte length
      someblob:
        id: 12
        type: blob
        description: "An opaque byte blob"
        maxlen: 16                         # caps the encoded byte length
        default: "SGVsbG8="                # base64 of the raw bytes ("Hello")

      # --- Enum ----------------------------------------------------------------
      # Members take either `{value, description}` or a bare integer shorthand;
      # values may be sparse and negative. `default` must name a valid value.
      someenum:
        id: 13
        type: enum
        description: "An enumeration of colors"
        enum:
          RED:    {value: 0, description: "The color red"}
          GREEN:  {value: -100, description: "The color green"}
          BLUE:   2                        # shorthand: name -> value
          YELLOW: 33
        default: 2                         # BLUE

      # --- Bitfield ------------------------------------------------------------
      # Independent flags, each at a fixed bit position, each with its own default.
      somebitfield:
        id: 14
        type: bitfield
        description: "A set of independent boolean flags"
        bits:
          flagA:
            pos: 0
            default: false
            description: "Feature A flag at bit 0"
          flagB:
            pos: 1
            default: true
            description: "Feature B flag at bit 1"

      # --- Arrays: fixed-count, grouped by element type ------------------------
      # `items.count` is the length; `items.maxlen` bounds each variable-length
      # element so fixed-storage targets can size buffers. Numeric arrays use the
      # array wire types (u/i/fp); string/blob arrays lower to sequences.
      someuintarray:
        id: 15
        type: array
        description: "Fixed array of 4 unsigned 32-bit integers"
        items:
          type: u32
          count: 4
        default: [0, 1, 1000, 4294967295]
      someintarray:
        id: 16
        type: array
        description: "Fixed array of 5 signed 32-bit integers"
        items:
          type: i32
          count: 5
        default: [10, 20, 300, 4000, 50000]
      somefloatarray:
        id: 17
        type: array
        description: "Fixed array of 3 32-bit floats"
        items:
          type: fp32
          count: 3
        default: [0.0, -1.5, 3.25]
      somestringarray:
        id: 18
        type: array
        description: "Fixed array of 5 strings"
        items:
          type: string
          count: 5
          maxlen: 16                       # caps the encoded byte length (per element)
        default: ["one", "two", "three", "four", "five"]
      someblobarray:
        id: 19
        type: array
        description: "Fixed array of 3 byte blobs"
        items:
          type: blob
          count: 3
          maxlen: 8                        # caps the encoded byte length (per element)
        default: ["AAEC", "//8=", "ZGF0YQ=="]   # base64 of the raw bytes

      # --- Struct (nested) -----------------------------------------------------
      # A composite type with its own id scope; structs may nest arbitrarily.
      somestruct:
        id: 20
        type: struct
        description: "A nested structure"
        fields:
          nestedint:
            id: 0
            type: u8
            description: "An unsigned 8-bit integer in the struct"
            default: 255
          nestedstring:
            id: 1
            type: string
            description: "A string in the struct"
            maxlen: 32                     # caps the encoded byte length
            default: "Nested"
          nestedstruct:
            id: 2
            type: struct
            description: "A deeper nested structure"
            fields:
              deepint:
                id: 0
                type: i32
                description: "A signed 32-bit integer two levels deep"
                default: -123456

      # --- Union ---------------------------------------------------------------
      # Exactly one option ("oneof") is active at a time. `default_id` selects
      # which option - and its defaults - apply when none is set explicitly.
      someunion:
        id: 21
        type: union
        description: "A field that holds exactly one of several options"
        default_id: 0                      # selects option1 when none is set
        oneof:
          option1:
            id: 0
            type: u16
            description: "An unsigned 16-bit integer option"
            default: 0
          option2:
            id: 1
            type: string
            description: "A string option"
            maxlen: 64                     # caps the encoded byte length
          option3:
            id: 2
            type: struct
            description: "A struct option"
            fields:
              unionstructint:
                id: 0
                type: i8
              unionstructbool:
                id: 1
                type: boolean

      # --- Struct containing an array (composite-in-struct) --------------------
      # A struct field may itself be an array; nothing new on the wire.
      somestructwitharray:
        id: 22
        type: struct
        description: "A struct that contains an array field"
        fields:
          label:
            id: 0
            type: string
            maxlen: 16
            default: "row"
          values:
            id: 1
            type: array
            description: "An array living inside a struct"
            items:
              type: u16
              count: 4
            default: [1, 2, 3, 4]

      # --- Array of structs ----------------------------------------------------
      # items.type: struct -> wrapper sequence of struct sequences.
      somestructarray:
        id: 23
        type: array
        description: "Array of up to 3 point structs"
        items:
          type: struct
          count: 3
          fields:
            x:
              id: 0
              type: i32
              default: 0
            y:
              id: 1
              type: i32
              default: 0

      # --- Array of arrays (matrix) --------------------------------------------
      # items.type: array -> outer wrapper sequence whose elements are arrays.
      somematrix:
        id: 24
        type: array
        description: "Array of up to 2 rows, each up to 4 u32"
        items:
          type: array
          count: 2
          items:
            type: u32
            count: 4

      # --- Array of unions -----------------------------------------------------
      # items.type: union -> wrapper sequence of union sequences.
      someunionarray:
        id: 25
        type: array
        description: "Array of up to 2 variant values"
        items:
          type: union
          count: 2
          default_id: 0
          oneof:
            asint:
              id: 0
              type: i32
            asstring:
              id: 1
              type: string
              maxlen: 16

      # --- Array of enum -------------------------------------------------------
      # enum -> signed varint, so this lowers to a signed-int array on the wire.
      someenumarray:
        id: 26
        type: array
        description: "Array of up to 4 colors"
        items:
          type: enum
          count: 4
          enum:
            RED: 0
            GREEN: 1
            BLUE: 2
        default: [2, 1, 0]

      # --- Array of boolean ----------------------------------------------------
      # boolean -> unsigned varint 0/1, so this lowers to an unsigned-int array.
      someboolarray:
        id: 27
        type: array
        description: "Array of up to 8 boolean flags"
        items:
          type: boolean
          count: 8
        default: [true, true, false]

      # --- Array of bitfield ---------------------------------------------------
      # bitfield -> packed unsigned varint, so this lowers to an unsigned-int array.
      somebitfieldarray:
        id: 28
        type: array
        description: "Array of up to 3 flag sets"
        items:
          type: bitfield
          count: 3
          bits:
            flagA: { pos: 0 }
            flagB: { pos: 1 }

      # --- Map = array of key/value structs, dynamic length --------------------
      # A map is just an array of {key, value} structs. `count` is OMITTED here:
      # the collection is dynamic (heap targets). A heap-less target would add a
      # `count` (capacity) so the buffer can be pre-sized. `count` never goes on
      # the wire either way.
      somemap:
        id: 29
        type: array
        description: "A string -> u32 map as key/value pairs (dynamic length)"
        items:
          type: struct
          fields:
            key:
              id: 0
              type: string
              maxlen: 32
            value:
              id: 1
              type: u32
