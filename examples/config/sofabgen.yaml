# Example sofabgen configuration (PLAN §7.4).
# Validated against schema/sofabgen-config-schema.json before use — the schema
# is closed (unknown keys are rejected) and lists only honored options.
generic:
  namespace: my.proj.messages   # per-language namespace targets override below
  output_dir: ./generated
  license: MIT                  # SPDX header; omit (or `none`) for no SPDX line
  emit: sources                 # or `project` for a buildable project scaffold
  # Receiver-side decode limits for schema-unbounded fields (no count/maxlen).
  # Unset = unlimited; exceeding one fails the decode with LimitExceeded.
  max_dyn_array_count: 65536    # elements, per unbounded array
  max_dyn_string_len: 4096      # bytes, per unbounded string
  max_dyn_blob_len: 4096        # bytes, per unbounded blob
targets:
  cpp:
    namespace: myproj::msg
    corelib: cpp                # or c-cpp for fixed-capacity, heap-free containers
  c:
    symbol_prefix: myproj_
  rust:
    corelib: rs                 # or rs-no-std for the #![no_std] profile
  go:
    package: messages
    module_path: github.com/myproj/messages
    go_version: "1.21"
  python: {}
  java:
    package: com.myproj.messages
  csharp:
    namespace: MyProj.Messages
  typescript:
    int64: bigint               # or long / number for a bigint-free hot path
  docs:
    format: html                # reference documentation instead of code
