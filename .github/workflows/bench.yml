name: Bench

# Regenerates tests/bench/results.txt and shows the diff against what is committed
# (ARCHITECTURE §15). The diff IS the result: a codegen change that costs or saves
# shows up here, next to the code that caused it.
#
# Deliberately NOT a hard gate. The corelibs are cloned unpinned (a corelib has to
# match the generated code built against it), so they can move between the commit
# that generated results.txt and this run — a `--check` failure would then be red for
# something the PR did not cause. The job posts the diff and stays green; the
# results.txt header records the corelib SHAs and toolchain versions so a reviewer
# can tell which side moved. Revisit once corelib-drift reds prove rare.
#
# Separate from ci.yml because it is slow (valgrind is ~50-100x, and the subtract
# rows run three rep points each) and because it needs cross toolchains and every
# corelib.
on:
  pull_request:
    paths:
      - 'generators/**'
      - 'internal/**'
      - 'cmd/**'
      - 'tests/bench/**'
      - 'examples/messages/realworld/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    # NOT ubuntu-latest, unlike ci.yml: when the image rolls, gcc/glibc change and
    # every number in results.txt moves at once, with no signal that it was the
    # image rather than the generator.
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        row: [c, cpp-cpp, cpp-c-cpp, rust-rs, rust-rs-no-std, zig, go, java, csharp, python, ts-bigint, ts-long]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - name: Toolchains
        run: |
          sudo apt-get update
          # valgrind is the point; the cross toolchains are for the footprint rows.
          # libstdc++-arm-none-eabi-newlib is easy to miss and its absence looks like
          # "C++ cannot cross-compile" rather than a missing package.
          sudo apt-get install -y valgrind
          case "${{ matrix.row }}" in
            c)
              sudo apt-get install -y gcc-arm-none-eabi gcc-riscv64-unknown-elf picolibc-riscv64-unknown-elf ;;
            cpp-*)
              sudo apt-get install -y gcc-arm-none-eabi libstdc++-arm-none-eabi-newlib ;;
          esac

      - uses: dtolnay/rust-toolchain@1.90.0
        if: startsWith(matrix.row, 'rust-')
        with:
          targets: thumbv6m-none-eabi
          components: llvm-tools-preview

      - uses: mlugg/setup-zig@v2
        if: matrix.row == 'zig'
        with: { version: "0.16.0" }

      - uses: actions/setup-java@v5
        if: matrix.row == 'java'
        with: { distribution: temurin, java-version: "17" }

      - uses: actions/setup-dotnet@v6
        if: matrix.row == 'csharp'
        with: { dotnet-version: "9.0.x" }

      - uses: actions/setup-python@v6
        if: matrix.row == 'python'
        with: { python-version: "3.14" }

      - uses: actions/setup-node@v7
        if: startsWith(matrix.row, 'ts-')
        with: { node-version: "24" }

      - name: Measure
        run: ./tests/bench/run.sh --rows ${{ matrix.row }} --out bench-${{ matrix.row }}.txt

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bench-${{ matrix.row }}
          path: bench-${{ matrix.row }}.txt

  report:
    needs: bench
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with: { path: measured }
      - name: Diff vs committed results.txt
        run: |
          {
            echo '## Bench'
            echo
            echo 'Each row was re-measured. Committed values on the left, this run on the right.'
            echo 'If a number moved but the header did not, the generator change caused it.'
            echo
            echo '```diff'
            for f in measured/*/bench-*.txt; do
              diff -u tests/bench/results.txt "$f" | grep -E '^[+-][a-z]' || true
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
