name: Bench

# Re-measures the bench rows and reports how they compare to the committed
# tests/bench/results.txt (ARCHITECTURE §15).
#
# MANUAL ONLY (workflow_dispatch). It does not run on pull_request, and the file it
# compares against is NOT produced here: results.txt is regenerated by hand in the
# devcontainer. Ir/op is the instruction count of a particular binary, so it depends
# on the compiler that built it — this runner pins its own toolchain versions and is
# therefore a second measuring device. It read the `go` encode row at 56,237 Ir/op
# where the devcontainer read the same commit at 24,698. Neither is wrong; they are
# different scales, which is why this cannot be a PR gate: it would be loud on every
# PR for reasons no PR caused.
#
# What it IS good for: a second opinion on demand. Run it when a local number looks
# implausible, or to check a row on a toolchain you do not have locally. The report
# step compares toolchains first and says so when they differ, so a moved row is not
# mistaken for a regression.
#
# Slow (valgrind is ~50-100x, and the subtract rows run three rep points each) and it
# needs cross toolchains plus every corelib — another reason it is not in ci.yml.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    # NOT ubuntu-latest, unlike ci.yml: when the image rolls, gcc/glibc change and
    # every number in results.txt moves at once, with no signal that it was the
    # image rather than the generator.
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        row: [c, cpp-cpp, cpp-c-cpp, rust-rs, rust-rs-no-std, zig, go, java, csharp, python, ts-bigint, ts-long]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - name: Toolchains
        run: |
          sudo apt-get update
          # valgrind is the point; the cross toolchains are for the footprint rows.
          # libstdc++-arm-none-eabi-newlib is easy to miss and its absence looks like
          # "C++ cannot cross-compile" rather than a missing package.
          sudo apt-get install -y valgrind
          case "${{ matrix.row }}" in
            c)
              sudo apt-get install -y gcc-arm-none-eabi gcc-riscv64-unknown-elf picolibc-riscv64-unknown-elf ;;
            cpp-*)
              sudo apt-get install -y gcc-arm-none-eabi libstdc++-arm-none-eabi-newlib ;;
          esac

      - uses: dtolnay/rust-toolchain@1.90.0
        if: startsWith(matrix.row, 'rust-')
        with:
          targets: thumbv6m-none-eabi
          components: llvm-tools-preview

      - uses: mlugg/setup-zig@v2
        if: matrix.row == 'zig'
        with: { version: "0.16.0" }

      - uses: actions/setup-java@v5
        if: matrix.row == 'java'
        with: { distribution: temurin, java-version: "17" }

      - uses: actions/setup-dotnet@v6
        if: matrix.row == 'csharp'
        with: { dotnet-version: "9.0.x" }

      - uses: actions/setup-python@v6
        if: matrix.row == 'python'
        with: { python-version: "3.14" }

      - uses: actions/setup-node@v7
        if: startsWith(matrix.row, 'ts-')
        with: { node-version: "24" }

      - name: Measure
        run: ./tests/bench/run.sh --rows ${{ matrix.row }} --out bench-${{ matrix.row }}.txt

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bench-${{ matrix.row }}
          path: bench-${{ matrix.row }}.txt

  report:
    needs: bench
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with: { path: measured }
      # Triage, not a diff dump: separates failed measurements from outliers from
      # ordinary movement, and leads with toolchain differences so a row that moved
      # because this runner has another compiler is not read as a regression.
      # Exits non-zero only on a FAILED measurement — drift is information, a row
      # that could not be measured is a broken run.
      - name: Report vs committed results.txt
        run: |
          python3 tests/bench/lib/report.py \
            --committed tests/bench/results.txt \
            --measured measured/*/bench-*.txt >> "$GITHUB_STEP_SUMMARY"
