name: Release

# ⚠️ DO NOT RENAME THIS FILE (release.yml).
# Its basename is part of the npm trusted-publishing (OIDC) identity: every
# @sofa-buffers/generator* package on npmjs.com has a Trusted Publisher pinned to
# repo sofa-buffers/generator + workflow filename "release.yml". Renaming (or
# moving) this file changes that OIDC claim, npm stops trusting the publish, and
# the npm-publish job below fails with E404 — the GitHub release still succeeds,
# so the break is silent to the binary/go-install path. If a rename is ever truly
# needed, update the Workflow-filename field on the Trusted Publisher of ALL ten
# packages (main + 9 platform) on npmjs.com first. See the npm-publish job.

# Builds the single, statically-linked, cross-platform sofabgen binaries and
# attaches them to a GitHub release on a v* tag (PLAN §1, M8).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Gate: the release tag is the single source of truth for the version (the
  # committed npm/package.json carries a 0.0.0-dev placeholder; the npm-publish
  # job injects the tag version at publish time). Fail fast here if the tag is
  # not a well-formed vMAJOR.MINOR.PATCH[-prerelease] version, before spending
  # CI on ten cross-builds and a GitHub release. workflow_dispatch (no tag) skips.
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Tag must be a well-formed semantic version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          echo "tag version: $tag_version"
          # MAJOR.MINOR.PATCH with an optional -prerelease / +build suffix.
          if ! printf '%s' "$tag_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)*$'; then
            echo "::error::tag '$GITHUB_REF_NAME' is not a valid vMAJOR.MINOR.PATCH version; refusing to build a release" >&2
            exit 1
          fi

  build:
    needs: check-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: x86-64, x86-32, ARM64, ARM32
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: "386" }
          - { goos: linux, goarch: arm64 }
          - { goos: linux, goarch: arm }
          # macOS: Intel + Apple Silicon (Go ships no 32-bit darwin targets)
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          # Windows: x86-64, x86-32, ARM64
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: windows, goarch: "386", ext: ".exe" }
          - { goos: windows, goarch: arm64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
      - name: Build static binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          # The release tag is the single source of truth for the version; inject
          # it so the binary self-reports the exact tag. Non-tag (workflow_dispatch)
          # builds keep the compiled-in dev placeholder.
          version="0.0.0-dev"
          case "$GITHUB_REF" in
            refs/tags/v*) version="${GITHUB_REF_NAME#v}" ;;
          esac
          out="sofabgen-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -X main.version=$version" -o "dist/$out" ./cmd/sofabgen
          (cd dist && sha256sum "$out" > "$out.sha256")
      - uses: actions/upload-artifact@v7
        with:
          name: sofabgen-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Guard — the binary must self-report the tag version
        run: |
          set -euo pipefail
          # Catch a silently no-op'd -ldflags injection (e.g. a renamed/moved
          # main.version): run the native binary and assert it reports the tag,
          # not the 0.0.0-dev placeholder. Only the linux-amd64 asset runs here.
          tag_version="${GITHUB_REF_NAME#v}"
          bin="dist/sofabgen-linux-amd64"
          chmod +x "$bin"
          got="$("$bin" --version)"
          echo "binary reports: '$got' (expected '$tag_version')"
          if [ "$got" != "$tag_version" ]; then
            echo "::error::sofabgen --version ($got) does not match tag ($tag_version); refusing to publish" >&2
            exit 1
          fi
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  # Publish the npm distribution (@sofa-buffers/generator + the nine per-platform
  # optional-dependency packages) built from the very binaries just released, so
  # `npm i -D @sofa-buffers/generator` mirrors the GitHub release.
  #
  # Auth is npm trusted publishing (OIDC) — no token. npm exchanges the GitHub
  # Actions id-token for a short-lived publish credential; each package must have
  # a Trusted Publisher configured on npmjs.com pinned to repo
  # sofa-buffers/generator + workflow filename "release.yml" (with an EMPTY
  # environment — this job defines none). That workflow filename is a matched part
  # of the OIDC identity: renaming this file breaks publishing (see the banner at
  # the top of this file). Provenance is attached automatically. OIDC cannot
  # CREATE a package, so every package's first-ever version is bootstrapped once
  # by hand (see npm/README.md); this job publishes all subsequent versions.
  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: actions/setup-node@v7
        with:
          node-version: "24" # trusted publishing needs Node >= 22.14
          registry-url: "https://registry.npmjs.org"
      - name: Use an npm that supports trusted publishing
        run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
      - name: Build per-platform packages from the released binaries
        working-directory: npm
        run: node scripts/build-platform-packages.js --from ../dist --version "${{ github.ref_name }}"
      - name: Guard — every package version must equal the tag version
        working-directory: npm
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          fail=0
          check() { # <label> <package.json path>
            v="$(node -p "require('$2').version")"
            echo "  $1: $v"
            if [ "$v" != "$tag_version" ]; then
              echo "::error::$1 version ($v) does not match tag version ($tag_version)" >&2
              fail=1
            fi
          }
          echo "expecting version $tag_version"
          check "@sofa-buffers/generator" ./package.json
          for d in packages/*/; do
            check "$(basename "$d")" "./$d/package.json"
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::version injection did not match the release tag; refusing to publish" >&2
            exit 1
          fi
      - name: Publish to npm via trusted publishing (OIDC)
        working-directory: npm
        run: |
          set -euo pipefail
          # No token: OIDC exchange happens inside `npm publish`. Platform packages
          # FIRST so the main package's optional deps resolve on install.
          for d in packages/*/; do
            npm publish "$d" --access public
          done
          npm publish . --access public
