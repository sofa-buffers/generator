name: Release

# Builds the single, statically-linked, cross-platform sofabgen binaries and
# attaches them to a GitHub release on a v* tag (PLAN §1, M8).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: x86-64, x86-32, ARM64, ARM32
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: "386" }
          - { goos: linux, goarch: arm64 }
          - { goos: linux, goarch: arm }
          # macOS: Intel + Apple Silicon (Go ships no 32-bit darwin targets)
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          # Windows: x86-64, x86-32, ARM64
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: windows, goarch: "386", ext: ".exe" }
          - { goos: windows, goarch: arm64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
      - name: Build static binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out="sofabgen-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w" -o "dist/$out" ./cmd/sofabgen
          (cd dist && sha256sum "$out" > "$out.sha256")
      - uses: actions/upload-artifact@v7
        with:
          name: sofabgen-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  # Publish the npm distribution (@sofa-buffers/generator + the nine per-platform
  # optional-dependency packages) built from the very binaries just released, so
  # `npm i -D @sofa-buffers/generator` mirrors the GitHub release.
  #
  # Auth is npm trusted publishing (OIDC) — no token. npm exchanges the GitHub
  # Actions id-token for a short-lived publish credential; each package must have
  # a Trusted Publisher configured on npmjs.com (repo sofa-buffers/generator,
  # workflow release.yml). Provenance is attached automatically. OIDC cannot
  # CREATE a package, so every package's first-ever version is bootstrapped once
  # by hand (see npm/README.md); this job publishes all subsequent versions.
  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # trusted publishing needs Node >= 22.14
          registry-url: "https://registry.npmjs.org"
      - name: Use an npm that supports trusted publishing
        run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
      - name: Build per-platform packages from the released binaries
        working-directory: npm
        run: node scripts/build-platform-packages.js --from ../dist --version "${{ github.ref_name }}"
      - name: Publish to npm via trusted publishing (OIDC)
        working-directory: npm
        run: |
          set -euo pipefail
          # No token: OIDC exchange happens inside `npm publish`. Platform packages
          # FIRST so the main package's optional deps resolve on install.
          for d in packages/*/; do
            npm publish "$d" --access public
          done
          npm publish . --access public
