name: Release

# Builds the single, statically-linked, cross-platform sofabgen binaries and
# attaches them to a GitHub release on a v* tag (PLAN §1, M8).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: x86-64, x86-32, ARM64, ARM32
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: "386" }
          - { goos: linux, goarch: arm64 }
          - { goos: linux, goarch: arm }
          # macOS: Intel + Apple Silicon (Go ships no 32-bit darwin targets)
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          # Windows: x86-64, x86-32, ARM64
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: windows, goarch: "386", ext: ".exe" }
          - { goos: windows, goarch: arm64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build static binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out="sofabgen-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w" -o "dist/$out" ./cmd/sofabgen
          (cd dist && sha256sum "$out" > "$out.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: sofabgen-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
