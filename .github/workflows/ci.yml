name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Language-independent core: builds, vets, and runs the hermetic test suite
  # (no external toolchain or corelib needed).
  hermetic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Gofmt check
        run: test -z "$(gofmt -l .)" || { echo "unformatted files:"; gofmt -l .; exit 1; }
      - name: Test
        run: go test ./... -count=1
      - name: Cross-compile matrix
        run: |
          for t in linux/amd64 linux/arm64 windows/amd64 darwin/arm64; do
            GOOS=${t%/*} GOARCH=${t#*/} CGO_ENABLED=0 go build -o /dev/null ./cmd/sbufgen
          done

  # Language milestone: C (corelib-c-cpp). Generates code, builds it against the
  # real corelib with gcc, round-trips through the harness, and checks byte-exact
  # output against the shared wire vectors. tests/c/run.sh clones the corelib.
  lang-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Toolchain
        run: gcc --version && make --version | head -1
      - name: C backend — generate, build, round-trip, conformance
        run: ./tests/c/run.sh

  # Language milestone: Go (corelib-go). Generates a module, builds it against
  # the real corelib, round-trips JSON, and checks byte-exact output against the
  # shared wire vectors. tests/go/run.sh clones the corelib.
  lang-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Go backend — generate, build, round-trip, conformance
        run: ./tests/go/run.sh

  # Language milestone: Python (corelib-py). Generates a module, syntax-checks,
  # round-trips JSON, and checks byte-exact output against the shared vectors.
  lang-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python backend — generate, syntax, round-trip, conformance
        run: ./tests/python/run.sh

  # Language milestone: TypeScript (corelib-ts). Builds the corelib, generates a
  # module, typechecks (strict), round-trips JSON, and checks byte-exact output
  # against the shared vectors. tests/typescript/run.sh clones + builds corelib.
  lang-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: TypeScript backend — build, typecheck, round-trip, conformance
        run: ./tests/typescript/run.sh

  # Language milestone: C++ max-speed (corelib-cpp). Generates header-only code,
  # builds it with g++ -std=c++20, round-trips JSON, and checks byte-exact output
  # against the shared vectors. run.sh clones corelib-cpp + corelib-c-cpp.
  lang-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Toolchain
        run: g++ --version | head -1
      - name: C++ backend — generate, build, round-trip, conformance
        run: ./tests/cpp/run.sh

  # Language milestone: Rust (corelib-rs-no-std). Generates a crate, builds it
  # with cargo, round-trips JSON, and checks byte-exact output against the shared
  # vectors. run.sh clones corelib-rs-no-std.
  lang-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust backend — generate, build, round-trip, conformance
        run: ./tests/rust/run.sh
