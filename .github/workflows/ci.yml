name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Language-independent core: builds, vets, and runs the hermetic test suite
  # (no external toolchain or corelib needed).
  hermetic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Gofmt check
        run: test -z "$(gofmt -l .)" || { echo "unformatted files:"; gofmt -l .; exit 1; }
      - name: Test
        run: go test ./... -count=1
      - name: Cross-compile matrix
        run: |
          for t in linux/amd64 linux/arm64 windows/amd64 darwin/arm64; do
            GOOS=${t%/*} GOARCH=${t#*/} CGO_ENABLED=0 go build -o /dev/null ./cmd/sofabgen
          done

  # Language milestone: C (corelib-c-cpp). Generates code, builds it against the
  # real corelib with gcc, round-trips through the harness, and checks byte-exact
  # output against the shared wire vectors. tests/conformance/c/run.sh clones the corelib.
  lang-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Toolchain
        run: gcc --version && make --version | head -1
      - name: C backend — generate, build, round-trip, conformance
        run: ./tests/conformance/c/run.sh
      - name: Generate sources (artifact)
        if: always()
        run: ./tests/gen-artifacts.sh c generated
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-c
          path: generated

  # Language milestone: Go (corelib-go). Generates a module, builds it against
  # the real corelib, round-trips JSON, and checks byte-exact output against the
  # shared wire vectors. tests/conformance/go/run.sh clones the corelib.
  lang-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Go backend — generate, build, round-trip, conformance
        run: ./tests/conformance/go/run.sh
      - name: Generate sources (artifact)
        if: always()
        run: ./tests/gen-artifacts.sh go generated
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-go
          path: generated

  # Language milestone: Python (corelib-py). Generates a module, syntax-checks,
  # round-trips JSON, and checks byte-exact output against the shared vectors.
  lang-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python backend — generate, syntax, round-trip, conformance
        run: ./tests/conformance/python/run.sh
      - name: Generate sources (artifact)
        if: always()
        run: ./tests/gen-artifacts.sh python generated
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-python
          path: generated

  # Language milestone: TypeScript (corelib-ts). Builds the corelib, generates a
  # module, typechecks (strict), round-trips JSON, and checks byte-exact output
  # against the shared vectors. tests/conformance/typescript/run.sh clones + builds corelib.
  lang-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: TypeScript backend — build, typecheck, round-trip, conformance
        run: ./tests/conformance/typescript/run.sh
      - name: Generate sources (artifact)
        if: always()
        run: ./tests/gen-artifacts.sh typescript generated
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-typescript
          path: generated

  # Language milestone: C++ (corelib-cpp + corelib-c-cpp). Generates code, builds
  # it with g++ -std=c++20, round-trips JSON, and checks byte-exact output against
  # the shared vectors — for BOTH C++ corelibs: the pure-C++20 corelib-cpp
  # (default) and the corelib-c-cpp C++ wrapper (corelib: c-cpp). run.sh clones
  # both corelibs.
  lang-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Toolchain
        run: g++ --version | head -1
      - name: C++ backend — generate, build, round-trip, conformance
        run: ./tests/conformance/cpp/run.sh
      - name: Generate sources (artifact)
        if: always()
        run: ./tests/gen-artifacts.sh cpp generated
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-cpp
          path: generated

  # Language milestone: Rust (corelib-rs-no-std + corelib-rs). Generates a crate,
  # builds it with cargo, round-trips JSON, and checks byte-exact output against
  # the shared vectors — for BOTH Rust corelibs: corelib-rs-no-std (default,
  # feature-gated; the corpus spans the no-std feature-subset matrix) and the
  # always-on std corelib-rs (corelib: rs). run.sh clones both.
  lang-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust backend — generate, build, round-trip, conformance
        run: ./tests/conformance/rust/run.sh
      - name: Generate sources (artifact)
        if: always()
        run: ./tests/gen-artifacts.sh rust generated
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-rust
          path: generated

  # Language milestone: C# / .NET (corelib-cs). Generates a project, builds it
  # with dotnet, round-trips JSON, and checks byte-exact output against the shared
  # vectors. run.sh clones corelib-cs.
  lang-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: C# backend — generate, build, round-trip, conformance
        run: ./tests/conformance/csharp/run.sh
      - name: Generate sources (artifact)
        if: always()
        run: ./tests/gen-artifacts.sh csharp generated
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-csharp
          path: generated

  # Language milestone: Java (corelib-java, Maven). Installs the corelib,
  # generates a Maven project, builds a fat jar, round-trips JSON, and checks
  # byte-exact output against the shared vectors. run.sh clones corelib-java.
  lang-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Java backend — generate, build, round-trip, conformance
        run: ./tests/conformance/java/run.sh
      - name: Generate sources (artifact)
        if: always()
        run: ./tests/gen-artifacts.sh java generated
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-java
          path: generated

  # Language milestone: Zig (corelib-zig, the max-speed port). Generates a Zig
  # package, builds it with zig build --release=fast, round-trips JSON, and
  # checks byte-exact output against the shared vectors. run.sh clones
  # corelib-zig.
  lang-zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Zig backend — generate, build, round-trip, conformance
        run: ./tests/conformance/zig/run.sh
      - name: Generate sources (artifact)
        if: always()
        run: ./tests/gen-artifacts.sh zig generated
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-zig
          path: generated

  # Docs target: non-code, so no toolchain, no conformance harness — nothing
  # executes. Renders the example + realworld + corpus definitions to the
  # self-contained HTML reference pages and attaches them as an artifact.
  lang-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Generate docs (artifact)
        run: ./tests/gen-artifacts.sh docs generated
      - uses: actions/upload-artifact@v4
        with:
          name: generated-docs
          path: generated
