name: npm

# Smoke-tests the npm distribution on every runner OS: build the host's
# per-platform package from the LATEST published release (downloads the binary
# and verifies its sha256), assemble an install tree, and run the CLI through the
# launcher shim. This exercises the exact production path end to end.
#
# The committed npm/package.json version is a placeholder (0.0.0-dev): the release
# tag is the single source of truth, injected at publish time (see
# npm/scripts/build-platform-packages.js). So this test resolves a real version
# from the latest GitHub release rather than from the committed manifest.
on:
  push:
    branches: [main]
    paths:
      - "npm/**"
      - ".github/workflows/npm.yml"
  pull_request:
    paths:
      - "npm/**"
      - ".github/workflows/npm.yml"
  workflow_dispatch:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Build host package and run the CLI through the launcher
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          case "$RUNNER_OS" in
            Linux)   plat=linux  ;;
            macOS)   plat=darwin ;;
            Windows) plat=win32  ;;
            *) echo "unknown RUNNER_OS: $RUNNER_OS"; exit 1 ;;
          esac
          case "$RUNNER_ARCH" in
            X64)   a=x64   ;;
            ARM64) a=arm64 ;;
            X86)   a=ia32  ;;
            *) echo "unknown RUNNER_ARCH: $RUNNER_ARCH"; exit 1 ;;
          esac
          tgt="$plat-$a"
          echo "host target: $tgt"

          cd npm
          # The committed version is a placeholder; resolve a real version from the
          # latest published release and test the production path against it.
          rel="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)"
          want="${rel#v}"
          echo "latest release: $rel (version $want)"

          # Download the matching release binary, verify its checksum, write the package.
          node scripts/build-platform-packages.js --only "$tgt" --version "$rel"

          # Assemble a node_modules install tree: main package + the one platform package.
          scope="$RUNNER_TEMP/nm/node_modules/@sofa-buffers"
          mkdir -p "$scope"
          cp -r . "$scope/generator"
          rm -rf "$scope/generator/packages" "$scope/generator/scripts"
          cp -r "packages/generator-$tgt" "$scope/generator-$tgt"

          # Run the CLI THROUGH the launcher shim (no bin symlink, direct node invoke).
          got="$(node "$scope/generator/bin/sofabgen.js" --version)"
          echo "launcher reported: '$got' (expected '$want')"
          test "$got" = "$want"

          # A real subcommand must also round-trip through the shim.
          node "$scope/generator/bin/sofabgen.js" --help >/dev/null
